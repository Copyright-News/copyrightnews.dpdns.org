name: Build & Deploy
on:
  push:
    branches: [master]
    paths:
      - 'content/**'
      - 'build.js'
      - 'templates/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node build.js

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-build posts from markdown"
          commit_user_name: "Copyright News Bot"
          commit_user_email: "bot@copyrightnews.dpdns.org"
