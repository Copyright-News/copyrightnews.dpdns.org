backend:
  name: github
  repo: Copyright-News/copyrightnews.dpdns.org
  branch: master
  auth_type: pkce
  app_id: REPLACE_WITH_YOUR_GITHUB_OAUTH_CLIENT_ID

media_folder: assets/images
public_folder: /assets/images

collections:
  - name: "tech"
    label: "Tech Articles"
    label_singular: "Tech Article"
    folder: "content/tech"
    create: true
    slug: "{{slug}}"
    extension: .md
    format: frontmatter
    preview_path: "tech/posts/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Author", name: "author", widget: "string", default: "Copyright News" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "MMMM D, YYYY" }
      - { label: "Read Time", name: "read_time", widget: "string", default: "5 min read" }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
      - { label: "Featured Image", name: "image", widget: "string", default: "https://picsum.photos/seed/tech/1200/600" }
      - { label: "Image Alt", name: "image_alt", widget: "string", default: "Tech article" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    extension: .md
    format: frontmatter
    preview_path: "blog/posts/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Author", name: "author", widget: "string", default: "Copyright News" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "MMMM D, YYYY" }
      - { label: "Read Time", name: "read_time", widget: "string", default: "5 min read" }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
      - { label: "Featured Image", name: "image", widget: "string", default: "https://picsum.photos/seed/blog/1200/600" }
      - { label: "Image Alt", name: "image_alt", widget: "string", default: "Blog article" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "influencers"
    label: "Influencer Articles"
    label_singular: "Influencer Article"
    folder: "content/influencers"
    create: true
    slug: "{{slug}}"
    extension: .md
    format: frontmatter
    preview_path: "influencers/posts/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Author", name: "author", widget: "string", default: "Copyright News" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "MMMM D, YYYY" }
      - { label: "Read Time", name: "read_time", widget: "string", default: "5 min read" }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
      - { label: "Featured Image", name: "image", widget: "string", default: "https://picsum.photos/seed/influencer/1200/600" }
      - { label: "Image Alt", name: "image_alt", widget: "string", default: "Influencer article" }
      - { label: "Body", name: "body", widget: "markdown" }
