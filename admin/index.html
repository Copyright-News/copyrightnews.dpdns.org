<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Manager</title>
</head>
<body>
  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://cdn.jsdelivr.net/npm/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
  const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
  CMS.init({
    config: {
      load_config_file: false,
      local_backend: isLocalhost,
      backend: isLocalhost ? {
        name: "proxy",
        proxy_url: "http://localhost:8081/api/v1"
      } : {
        name: "github",
        repo: "Copyright-News/copyrightnews.dpdns.org",
        branch: "master",
        auth_type: "pkce",
        app_id: "Ov23liqtlcEakuRO8s8s"
      },
      media_folder: "assets/images",
      public_folder: "/assets/images",
      slug: {
        encoding: "ascii",
        clean_accents: true,
        sanitize_replacement: "-"
      },
      collections: [
        {
          name: "tech",
          label: "Tech Articles",
          folder: "content/tech",
          create: true,
          slug: "{{slug}}",
          fields: [
            { name: "title", label: "Title", widget: "string" },
            { name: "author", label: "Author", widget: "string", default: "Copyright News" },
            { name: "date", label: "Publish Date", widget: "datetime", format: "MMMM D, YYYY" },
            { name: "read_time", label: "Read Time", widget: "string", default: "5 min read" },
            { name: "excerpt", label: "Excerpt", widget: "text", required: false },
            { name: "image", label: "Featured Image", widget: "image", default: "https://picsum.photos/seed/tech/1200/600" },
            { name: "image_alt", label: "Image Alt", widget: "string", default: "Tech article" },
            { name: "body", label: "Body", widget: "markdown" }
          ]
        },
        {
          name: "blog",
          label: "Blog Posts",
          folder: "content/blog",
          create: true,
          slug: "{{slug}}",
          fields: [
            { name: "title", label: "Title", widget: "string" },
            { name: "author", label: "Author", widget: "string", default: "Copyright News" },
            { name: "date", label: "Publish Date", widget: "datetime", format: "MMMM D, YYYY" },
            { name: "read_time", label: "Read Time", widget: "string", default: "5 min read" },
            { name: "excerpt", label: "Excerpt", widget: "text", required: false },
            { name: "image", label: "Featured Image", widget: "image", default: "https://picsum.photos/seed/blog/1200/600" },
            { name: "image_alt", label: "Image Alt", widget: "string", default: "Blog article" },
            { name: "body", label: "Body", widget: "markdown" }
          ]
        },
        {
          name: "influencers",
          label: "Influencer Articles",
          folder: "content/influencers",
          create: true,
          slug: "{{slug}}",
          fields: [
            { name: "title", label: "Title", widget: "string" },
            { name: "author", label: "Author", widget: "string", default: "Copyright News" },
            { name: "date", label: "Publish Date", widget: "datetime", format: "MMMM D, YYYY" },
            { name: "read_time", label: "Read Time", widget: "string", default: "5 min read" },
            { name: "excerpt", label: "Excerpt", widget: "text", required: false },
            { name: "image", label: "Featured Image", widget: "image", default: "https://picsum.photos/seed/influencer/1200/600" },
            { name: "image_alt", label: "Image Alt", widget: "string", default: "Influencer article" },
            { name: "body", label: "Body", widget: "markdown" }
          ]
        }
      ]
    }
  });
  </script>
</body>
</html>
