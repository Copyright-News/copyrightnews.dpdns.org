<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — Copyright News</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner container">
      <a href="/" class="site-logo">Copyright News</a>
      <nav class="main-nav">
        <a href="/">Home</a>
        <a href="/tech/">Tech</a>
        <a href="/influencers/">Influencers</a>
        <a href="/blog/">Blog</a>
        <a href="/about.html">About</a>
      </nav>
    </div>
  </header>

  <main class="article-container">
    <article>
      <header class="article-header">
        <h1>{{TITLE}}</h1>
        <div class="article-meta">
          <span>{{CATEGORY}}</span>
          <span>•</span>
          <span>By {{AUTHOR}}</span>
          <span>•</span>
          <span>{{DATE}}</span>
          <span>•</span>
          <span>{{READ_TIME}}</span>
        </div>
      </header>

      {{#if IMAGE}}
      <img class="article-hero-image" src="{{IMAGE}}" alt="{{IMAGE_ALT}}" />
      {{/if}}

      <div class="prose">
        {{BODY}}
      </div>

      <a href="/{{SECTION}}/" class="back-link">← Back to {{SECTION_LABEL}}</a>
    </article>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Copyright News. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
