<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Manager | Copyright News</title>
</head>
<body>
  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://cdn.jsdelivr.net/npm/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
  const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

  const articleFields = [
    { name: "title", label: "Title", widget: "string", required: true },
    { 
      name: "category", 
      label: "Category", 
      widget: "select", 
      options: ["AI", "Web Dev", "Security", "Hardware", "Software", "Policy", "Creator Economy"],
      default: "Web Dev",
      required: true
    },
    { name: "tags", label: "Tags", widget: "list", allow_add: true, hint: "Press Enter after each tag" },
    { name: "author", label: "Author", widget: "string", default: "Copyright News" },
    { 
      name: "date", 
      label: "Publish Date", 
      widget: "datetime", 
      format: "MMMM D, YYYY", 
      date_format: "YYYY-MM-DD", 
      time_format: false,
      required: true
    },
    { name: "read_time", label: "Read Time", widget: "string", default: "5 min read" },
    { 
      name: "image", 
      label: "Featured Image", 
      widget: "image", 
      allow_multiple: false,
      media_library: { config: { max_file_size: 5242880 } },
      hint: "Recommended: 1200x675px (16:9 ratio). Max 5MB.",
      required: true
    },
    { name: "image_alt", label: "Image Alt Text", widget: "string", required: true },
    { 
      name: "excerpt", 
      label: "Excerpt", 
      widget: "text", 
      required: true, 
      hint: "Max 160 characters. Used for SEO and card previews." 
    },
    { 
      name: "body", 
      label: "Article Content", 
      widget: "markdown", 
      modes: ["rich_text", "raw"],
      required: true
    }
  ];

  CMS.init({
    config: {
      load_config_file: false,
      local_backend: isLocalhost,
      backend: isLocalhost ? {
        name: "proxy",
        proxy_url: "http://localhost:8081/api/v1"
      } : {
        name: "github",
        repo: "Copyright-News/copyrightnews.dpdns.org",
        branch: "master",
        auth_methods: ["token"]
      },
      media_folder: "assets/images",
      public_folder: "/assets/images",
      slug: { encoding: "ascii", clean_accents: true, sanitize_replacement: "-" },
      collections: [
        {
          name: "tech",
          label: "Tech Articles",
          folder: "content/tech",
          create: true,
          slug: "{{slug}}",
          sortable_fields: ["date", "title", "category"],
          view_filters: [
            { label: "Published This Month", field: "date", pattern: "{{year}}-{{month}}" },
            { label: "AI Category", field: "category", pattern: "AI" }
          ],
          fields: articleFields
        },
        {
          name: "blog",
          label: "Blog Posts",
          folder: "content/blog",
          create: true,
          slug: "{{slug}}",
          sortable_fields: ["date", "title", "category"],
          view_filters: [{ label: "Published This Month", field: "date", pattern: "{{year}}-{{month}}" }],
          fields: articleFields
        },
        {
          name: "influencers",
          label: "Influencer Articles",
          folder: "content/influencers",
          create: true,
          slug: "{{slug}}",
          sortable_fields: ["date", "title", "category"],
          view_filters: [
            { label: "Published This Month", field: "date", pattern: "{{year}}-{{month}}" },
            { label: "Creator Economy", field: "category", pattern: "Creator Economy" }
          ],
          fields: articleFields
        }
      ]
    }
  });
  </script>
</body>
</html>
